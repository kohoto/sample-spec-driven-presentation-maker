project_name: sample-spec-driven-presentation-maker

global_settings:
  severity_threshold: HIGH
  ignore_paths:
    - path: "infra/node_modules/**"
      reason: "CDK bundled code — not our source code"

  suppressions:
    # --- CFn Custom Resource: urlopen to pre-signed ResponseURL ---
    # Standard pattern for CloudFormation custom resources.
    # The URL is the CFn-provided ResponseURL, not user-controlled.

    - rule_id: "B310"
      path: "infra/lambdas/kb-provisioner/index.py"
      reason: >
        urllib.request.urlopen sends CloudFormation custom resource response
        to the pre-signed ResponseURL. Standard CFn pattern. URL is not user-controlled.
      expiration: "2027-03-29"

    - rule_id: "B310"
      path: "infra/lambdas/bedrock-logging/index.py"
      reason: >
        urllib.request.urlopen sends CloudFormation custom resource response
        to the pre-signed ResponseURL. Standard CFn pattern. URL is not user-controlled.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.audit.dynamic-urllib-use-detected.dynamic-urllib-use-detected"
      path: "infra/lambdas/kb-provisioner/index.py"
      reason: >
        Same as B310 above. CFn custom resource ResponseURL pattern.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.audit.dynamic-urllib-use-detected.dynamic-urllib-use-detected"
      path: "infra/lambdas/bedrock-logging/index.py"
      reason: >
        Same as B310 above. CFn custom resource ResponseURL pattern.
      expiration: "2027-03-29"

    # --- CDK local bundling: execSync at build time only ---
    # execSync runs hardcoded cp commands during CDK synth/build on the
    # developer's machine. Not executed at runtime. No user input.

    - rule_id: "javascript.lang.security.detect-child-process.detect-child-process"
      path: "infra/lib/web-ui-stack.ts"
      reason: >
        execSync copies api/ and shared/ into Lambda asset output directory
        at CDK synth time. Hardcoded cp commands, no user input, build-time only.
      expiration: "2027-03-29"

    - rule_id: "javascript.lang.security.detect-child-process.detect-child-process"
      path: "infra/lib/data-stack.ts"
      reason: >
        execSync copies assets/ into Lambda asset output directory
        at CDK synth time. Hardcoded cp commands, no user input, build-time only.
      expiration: "2027-03-29"

    - rule_id: "javascript.lang.security.detect-child-process.detect-child-process"
      path: "web-ui/src/lib/local/acp-process.ts"
      reason: >
        spawn launches the local ACP agent process on the developer's machine.
        Command path comes from hardcoded config, not user input. Local mode only.
      expiration: "2027-03-29"

    - rule_id: "javascript.lang.security.detect-child-process.detect-child-process"
      path: "web-ui/src/app/api/open/route.ts"
      reason: >
        execFile opens a local file with the OS default handler (open/xdg-open).
        Path is allowlist-validated via SAFE_SEGMENT regex. Local mode only,
        runs on developer's machine.
      expiration: "2027-03-29"

    # --- Bandit B108: /tmp usage in local/container code ---

    - rule_id: "B108"
      path: "agent/modes/separated/composer.py"
      reason: >
        /tmp/compose_stops is used for inter-agent stop signalling inside
        a Fargate container. Not shared with untrusted processes.
      expiration: "2027-03-29"

    - rule_id: "B108"
      path: "mcp-local/server_acp.py"
      reason: >
        /tmp/pptx-preview is used for transient preview files in the local
        MCP server. Runs on developer's machine only.
      expiration: "2027-03-29"

    # --- Bandit B310: urlopen in upload_tools ---

    - rule_id: "B310"
      path: "mcp-local/upload_tools.py"
      reason: >
        urlopen fetches user-provided URLs for image/attachment import.
        This is intentional functionality — the user explicitly provides
        the URL. Local mode only.
      expiration: "2027-03-29"

    # --- Semgrep dynamic-urllib in upload_tools ---

    - rule_id: "python.lang.security.audit.dynamic-urllib-use-detected.dynamic-urllib-use-detected"
      path: "mcp-local/upload_tools.py"
      reason: >
        Same as B310 above. User-provided URL for attachment import.
        Local mode only.
      expiration: "2027-03-29"

    # --- Semgrep path-join-resolve-traversal: Local-only API routes ---
    # All web-ui/src/app/api/ routes are Local-mode only (excluded from
    # cloud build). They run on the developer's own machine via localhost.
    # Path inputs come from the local UI, not from untrusted network sources.

    - rule_id: "javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal"
      path: "web-ui/src/app/api/decks/route.ts"
      reason: >
        Local-only API route. deckId comes from local UI, path.join results
        are validated with startsWith guard. Not exposed to network.
      expiration: "2027-03-29"

    - rule_id: "javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal"
      path: "web-ui/src/app/api/open/route.ts"
      reason: >
        Local-only API route. Inputs are allowlist-validated via SAFE_SEGMENT
        regex + startsWith containment check.
      expiration: "2027-03-29"

    - rule_id: "javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal"
      path: "web-ui/src/app/api/upload/route.ts"
      reason: >
        Local-only API route. file.name is used with a temp directory,
        not user-controlled path traversal risk. Local mode only.
      expiration: "2027-03-29"

    - rule_id: "javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal"
      path: "web-ui/src/lib/local/acp-process.ts"
      reason: >
        Local-mode session persistence. deckId is from local UI, dir is
        constructed from DECK_ROOT + validated deckId. Not network-exposed.
      expiration: "2027-03-29"

    - rule_id: "javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal"
      path: "web-ui/src/lib/local/deck-paths.ts"
      reason: >
        Shared path utility for local mode. deckId is validated by callers
        and results are checked with startsWith guard. Not network-exposed.
      expiration: "2027-03-29"

    # --- Container binding to 0.0.0.0 ---
    # MCP server runs inside a Fargate container behind AgentCore Runtime.
    # Binding to all interfaces is required for container networking.

    - rule_id: "B104"
      path: "mcp-server/server.py"
      reason: >
        MCP server runs in a Fargate container behind AgentCore Runtime.
        Binding to 0.0.0.0 is required for container networking.
        Not exposed to the public internet directly.
      expiration: "2027-03-29"

    # --- /tmp usage in local CLI tools ---
    # These are local developer tools (Layer 1-2), not server-side code.
    # /tmp is used for transient preview files and build artifacts.

    - rule_id: "B108"
      path: "mcp-local/tools.py"
      reason: >
        Local MCP server (Layer 2) uses /tmp for transient PPTX preview files.
        Runs on developer's machine, not in a shared server environment.
      expiration: "2027-03-29"

    - rule_id: "B108"
      path: "skill/sdpm/api.py"
      reason: >
        High-level API uses /tmp for transient PPTX preview files.
        Extracted from pptx_builder.py (Layer 1). Runs on developer's machine,
        not in a shared server environment.
      expiration: "2027-03-29"

    - rule_id: "B108"
      path: "skill/sdpm/analyzer/__init__.py"
      reason: >
        Template analyzer reads preview PNGs from /tmp. Local CLI tool (Layer 1),
        runs on developer's machine only.
      expiration: "2027-03-29"

    - rule_id: "B108"
      path: "skill/scripts/pptx_builder.py"
      reason: >
        CLI entry point uses /tmp for transient build artifacts and previews.
        Local tool (Layer 1), runs on developer's machine only.
      expiration: "2027-03-29"

    # --- XML parsing of trusted PPTX content ---
    # ET.fromstring parses XML extracted from PPTX files that the tool itself
    # generated or that the user explicitly provided. Not untrusted network input.

    - rule_id: "B314"
      path: "skill/sdpm/converter/color.py"
      reason: >
        ET.fromstring parses theme XML from PPTX files provided by the user
        or generated by the tool. Input is a local .pptx file, not untrusted
        network data. python-pptx itself uses the same pattern.
      expiration: "2027-03-29"

    - rule_id: "B314"
      path: "skill/sdpm/converter/slide.py"
      reason: >
        ET.fromstring parses slide XML from PPTX files. Same rationale as
        color.py — local file input, not untrusted network data.
      expiration: "2027-03-29"

    - rule_id: "B314"
      path: "skill/sdpm/converter/xml_helpers.py"
      reason: >
        ET.fromstring parses shape XML from PPTX files. Same rationale —
        local file input, not untrusted network data.
      expiration: "2027-03-29"

    - rule_id: "B310"
      path: "skill/scripts/download_aws_icons.py"
      reason: >
        urlopen downloads the official AWS Architecture Icons asset package
        from a hardcoded HTTPS URL (ASSET_PACKAGE_URL constant).
        URL is not user-controlled. Developer utility script only.
      expiration: "2027-03-29"

    # --- Semgrep subprocess audit (nosemgrep inline comments not recognized by Holmes) ---
    # All subprocess calls use hardcoded commands or validated local file paths.
    # This is a CLI tool / MCP server that runs on the user's own machine or
    # in a trusted Fargate container. No untrusted user input reaches subprocess.

    - rule_id: "python.lang.security.audit.dangerous-subprocess-use-audit"
      path: "mcp-local/tools.py"
      reason: >
        subprocess.run invokes pdftoppm/osascript/PowerShell with hardcoded
        commands and local file paths. Local MCP server (Layer 2), runs on
        developer's machine. nosemgrep inline comment present but not recognized.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.audit.dangerous-subprocess-use-audit"
      path: "skill/scripts/pptx_builder.py"
      reason: >
        subprocess.run invokes LibreOffice/pdftoppm for PPTX-to-PNG conversion.
        Commands are hardcoded, file paths are from local filesystem.
        CLI tool (Layer 1). nosemgrep inline comment present but not recognized.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.audit.dangerous-subprocess-use-audit"
      path: "skill/sdpm/converter/pipeline.py"
      reason: >
        subprocess.run invokes LibreOffice for PPTX-to-PDF conversion.
        Hardcoded command, local file path. nosemgrep inline comment present.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.audit.dangerous-subprocess-use-audit"
      path: "skill/sdpm/diff/__init__.py"
      reason: >
        subprocess.run invokes LibreOffice for slide diff preview generation.
        Hardcoded commands, local temp directory paths.
        nosemgrep inline comment present but not recognized.
      expiration: "2027-03-29"

    # --- Semgrep defusedxml (defuse_stdlib() applied but not recognized) ---
    # All four modules call defusedxml.defuse_stdlib() at import time,
    # which monkey-patches xml.etree.ElementTree to use safe parsers.
    # Semgrep does not recognize this pattern and still flags the import.

    - rule_id: "python.lang.security.use-defused-xml"
      path: "skill/sdpm/converter/slide.py"
      reason: >
        Module calls defusedxml.defuse_stdlib() at import time (line 3-4).
        This patches xml.etree.ElementTree globally. Semgrep does not
        recognize defuse_stdlib() as a mitigation.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.use-defused-xml"
      path: "skill/sdpm/converter/color.py"
      reason: >
        Same as slide.py — defusedxml.defuse_stdlib() applied at import time.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.use-defused-xml"
      path: "skill/sdpm/converter/constants.py"
      reason: >
        Same as slide.py — defusedxml.defuse_stdlib() applied at import time.
      expiration: "2027-03-29"

    - rule_id: "python.lang.security.use-defused-xml"
      path: "skill/sdpm/converter/xml_helpers.py"
      reason: >
        Same as slide.py — defusedxml.defuse_stdlib() applied at import time.
      expiration: "2027-03-29"

    # --- Dockerfile base images from ECR Public Gallery ---
    # All Dockerfiles use public.ecr.aws images. Suppressed as these are
    # official mirrors, not third-party registries.

    - rule_id: "bosco/non-ecr-docker-image"
      path: "agent/Dockerfile"
      reason: >
        Uses public.ecr.aws/docker/library/python:3.13-slim-bookworm from
        ECR Public Gallery. This is the official Python image mirror on ECR.
      expiration: "2027-03-29"

    - rule_id: "bosco/non-ecr-docker-image"
      path: "mcp-server/Dockerfile"
      reason: >
        Uses public.ecr.aws/docker/library/python:3.13-slim from
        ECR Public Gallery. This is the official Python image mirror on ECR.
      expiration: "2027-03-29"

    # --- GitHub Actions workflow_dispatch inputs ---
    # blog-draft.yml requires user-provided PR numbers to select which PRs
    # to generate a blog draft from. This is by design, not a supply chain risk.

    - rule_id: "CKV_GHA_7"
      path: ".github/workflows/blog-draft.yml"
      reason: >
        workflow_dispatch inputs (pr_numbers, blog_theme) are required for
        PR selection. Inputs are used only via env: variables to prevent
        shell injection. Not a supply chain concern.
      expiration: "2027-03-29"
