# Deployment configuration for spec-driven-presentation-maker CDK stacks.
# Copy this file to config.yaml and customize.
#
# Layer 3 (MCP Server only):
#   stacks.data + stacks.runtime = true, everything else false
#
# Layer 4 (Full stack):
#   + stacks.agent + stacks.webUi = true

stacks:
  data: true           # Required — DynamoDB + S3
  runtime: true        # Required — AgentCore Runtime MCP Server
  agent: false         # Layer 4 — Strands Agent on AgentCore Runtime
  webUi: false         # Layer 4 — React Web UI (Amplify Hosting)

features:
  searchSlides: false   # Semantic slide search (requires Bedrock Knowledge Base)
  observability: false  # Bedrock Model Invocation Logging (account-level, skipped if already configured)

# Model configuration for the Agent (Layer 4).
# Use inference profile IDs for cross-region routing.
# Examples:
#   global.anthropic.claude-sonnet-4-6              (all regions, recommended)
#   us.anthropic.claude-sonnet-4-6                  (US regions only)
#   global.anthropic.claude-opus-4-6-v1             (all regions, higher cost)
#   us.anthropic.claude-sonnet-4-5-20250929-v1:0    (US regions only)
model:
  defaults:
    chat: "global.anthropic.claude-sonnet-4-6"
    # chat: "global.anthropic.claude-opus-4-6-v1"
    create: "global.anthropic.claude-sonnet-4-6"   # omit to inherit from chat

  # Per-user model switching in the Settings Sheet.
  # All models are enabled by default. To disable a model for end users,
  # prefix its line with `#`.
  # Each entry must be registered in infra/lib/model-metadata.ts.
  # Both defaults.chat and defaults.create must appear in this list.
  allowedModelIds:
    - "global.anthropic.claude-sonnet-4-6"           # recommended (matches defaults.chat)
    - "global.anthropic.claude-opus-4-7"
    - "global.anthropic.claude-haiku-4-5-20251001-v1:0"
    - "moonshotai.kimi-k2.5"
    - "deepseek.v3.2"
    - "qwen.qwen3-235b-a22b-2507-v1:0"
    - "us.amazon.nova-pro-v1:0"
    - "us.amazon.nova-lite-v1:0"

# WAF IP address restriction (optional).
# When specified, only the listed IP ranges can access CloudFront and API Gateway.
# waf:
#   allowedIpV4AddressRanges:
#     - "192.168.0.0/16"
#     - "10.0.0.0/8"
#   allowedIpV6AddressRanges:
#     - "2001:db8::/32"
